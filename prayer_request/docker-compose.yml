# Copy .env.example to .env and set BLOCKS_API_KEY, YOUVERSION_APP_KEY, OPENAI_API_KEY, then:
#   docker compose up --build
name: prayer-request

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: prayer-request:local
    container_name: prayer-request-agent
    env_file:
      - .env
    environment:
      PROMPTS_DIR: /app/prompts
    restart: on-failure:5
